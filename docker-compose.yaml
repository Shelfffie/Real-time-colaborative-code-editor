services:
  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - POSTGRES_HOST=host.docker.internal
      - POSTGRES_PORT=5431
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=89482
      - POSTGRES_DB=postgres
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
